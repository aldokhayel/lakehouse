seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets: ["target", "dbt_packages"]

models:
  lakehouse:
    raw:
      +schema: raw
      +materialized: view
    staging:
      +schema: staging
      +materialized: table
    mart:
      +schema: mart
      +materialized: table

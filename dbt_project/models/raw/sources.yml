version: 2

sources:
  - name: raw
    description: Raw data layer — untouched data landed by NiFi ingestion jobs.
    database: iceberg
    schema: raw
    tables:
      - name: raw_orders
        description: Raw order records as ingested from the source system.
        columns:
          - name: order_id
            description: Unique order identifier.
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Customer identifier.
            tests:
              - not_null
          - name: order_date
            description: Date the order was placed.
          - name: amount
            description: Order total in source currency.
          - name: status
            description: Order status (completed, pending, cancelled).
            tests:
              - accepted_values:
                  values: ['completed', 'pending', 'cancelled', 'refunded']
          - name: _ingested_at
            description: Timestamp when the row was ingested.

# infrastructure/trino/etc/catalog/mssql.properties
# Trino catalog for querying an external SQL Server / Azure SQL database.
# Connection details are read from environment variables at runtime.

connector.name=sqlserver
connection-url=jdbc:sqlserver://${ENV:MSSQL_HOST:-mssql}:${ENV:MSSQL_PORT:-1433};databaseName=${ENV:MSSQL_DATABASE:-master}
connection-user=${ENV:MSSQL_USER:-sa}
connection-password=${ENV:MSSQL_PASSWORD:-YourStrong@Passw0rd}

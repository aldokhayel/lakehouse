# infrastructure/trino/etc/catalog/postgresql.properties
# Trino catalog for querying an external PostgreSQL database directly.
# Connection details are read from environment variables at runtime.

connector.name=postgresql
connection-url=jdbc:postgresql://${ENV:PG_HOST:-postgres}:${ENV:PG_PORT:-5432}/${ENV:PG_DATABASE:-postgres}
connection-user=${ENV:PG_USER:-postgres}
connection-password=${ENV:PG_PASSWORD:-postgres}

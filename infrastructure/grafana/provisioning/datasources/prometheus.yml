# infrastructure/grafana/provisioning/datasources/prometheus.yml
# Auto-provisions the Prometheus datasource so Grafana is ready on first boot.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
